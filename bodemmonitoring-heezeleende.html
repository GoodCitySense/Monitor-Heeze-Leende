<body>
<div id="header">
  <div>
    <h1>&#127807; Pientere Tuinen Heeze-Leende</h1>
    <div class="sub">De ontwikkeling van de bodemtemperatuur en -vochtigheid per uur gedurende 11 dagen vergeleken met KNMI-station Eindhoven (stn 370)</div>
  </div>
  <div class="tgrp">
    <button class="tbtn active" id="btnT" onclick="setMode('temp')">&#127777; Bodemtemperatuur</button>
    <button class="tbtn" id="btnM" onclick="setMode('moist')">&#128167; Bodemvocht</button>
  </div>
</div>
<div id="main">
  <div id="mapPanel">
    <div id="map"></div>
    <div id="mapLegend">
      <span id="lMin">10&deg;C</span>
      <canvas class="gbar" id="lGrad" width="100" height="8"></canvas>
      <span id="lMax">45&deg;C</span>
      <span style="margin-left:auto;font-size:.68rem" id="sCnt">&#8212; sensoren</span>
    </div>
  </div>
  <div id="chartPanel">
    <div id="chartTitle">Bodemtemperatuur sensoren vs. luchttemperatuur KNMI Eindhoven</div>
    <div id="chartMeta">&#8212;</div>
    <div id="chartWrap"><canvas id="mainChart"></canvas></div>
  </div>
</div>
<div id="controls">
  <div class="crow">
    <button class="sbtn" onclick="step(-1)">&#9664;</button>
    <button class="pbtn" id="pb" onclick="togglePlay()">&#9654;</button>
    <button class="sbtn" onclick="step(1)">&#9654;</button>
    <input type="range" id="slider" min="0" max="287" value="0" oninput="onSlide(this.value)">
    <div id="tdisp">&#8212;</div>
    <select class="spd" id="spd">
      <option value="800">Langzaam</option>
      <option value="400" selected>Normaal</option>
      <option value="150">Snel</option>
      <option value="60">Zeer snel</option>
    </select>
  </div>
</div>

var TEMP_MIN=10,TEMP_MAX=45,MOIST_MIN=0,MOIST_MAX=50;

// Kleur interpolatie
var TGRAD=[[0,0,0,255],[0.3,0,255,255],[0.55,0,255,0],[0.75,255,255,0],[1,255,0,0]];
var MGRAD=[[0,212,164,76],[0.3,168,201,126],[0.6,86,180,233],[1,0,114,178]];
function hex2(n){return Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,"0");}
function interpColor(t,grad){
  for(var i=1;i<grad.length;i++){
    if(t<=grad[i][0]){
      var f=(t-grad[i-1][0])/(grad[i][0]-grad[i-1][0]);
      return "#"+hex2(grad[i-1][1]+f*(grad[i][1]-grad[i-1][1]))+hex2(grad[i-1][2]+f*(grad[i][2]-grad[i-1][2]))+hex2(grad[i-1][3]+f*(grad[i][3]-grad[i-1][3]));
    }
  }
  var l=grad[grad.length-1];return"#"+hex2(l[1])+hex2(l[2])+hex2(l[3]);
}
function valColor(val,mode){
  if(val===null||val===undefined)return"#444";
  var mn=mode==="temp"?TEMP_MIN:MOIST_MIN,mx=mode==="temp"?TEMP_MAX:MOIST_MAX;
  return interpColor(Math.max(0,Math.min(1,(val-mn)/(mx-mn))),mode==="temp"?TGRAD:MGRAD);
}

// Leaflet
var map=L.map("map",{center:[51.375,5.575],zoom:12});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap",maxZoom:18}).addTo(map);

var markers=[];
SENSOR_LOCS.forEach(function(loc,i){
  var m=L.circleMarker([loc[0],loc[1]],{radius:7,fillColor:"#444",color:"#fff",weight:1,opacity:0,fillOpacity:0});
  m.sensorIdx=i;m.addTo(map);markers.push(m);
});

function updateMarkers(idx){
  markers.forEach(function(m){m.setStyle({fillOpacity:0,opacity:0});});
  var pts=HOURLY_DATA[GCS_HOURS[idx]];
  if(!pts)return;
  var active=0;
  pts.forEach(function(p){
    var m=markers[p[0]];if(!m)return;
    var val=currentMode==="temp"?p[1]:p[2];
    if(val===null||val===undefined){m.setStyle({fillOpacity:0,opacity:0});return;}
    m.setStyle({fillColor:valColor(val,currentMode),fillOpacity:.9,color:"#fff",opacity:.7});
    m.unbindTooltip();
    m.bindTooltip((currentMode==="temp"?val.toFixed(1)+"°C":val.toFixed(1)+"%"),{direction:"top"});
    active++;
  });
  document.getElementById("sCnt").textContent=active+" sensoren";
}

// Chart
var mainChart=null;
var vLinePlugin={
  id:"vl",
  afterDraw:function(c){
    var idx=currentIdx;
    if(idx<0||idx>=GCS_HOURS.length)return;
    var n=GCS_HOURS.length-1;
    var x=c.chartArea.left+(idx/n)*(c.chartArea.right-c.chartArea.left),ctx=c.ctx;
    ctx.save();ctx.beginPath();
    ctx.moveTo(x,c.chartArea.top);ctx.lineTo(x,c.chartArea.bottom);
    ctx.strokeStyle="rgba(233,69,96,.9)";ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }
};

function chartLabels(){
  return GCS_HOURS.map(function(h){
    var d=new Date(h);
    return d.getUTCHours()===0?d.getUTCDate()+"/"+(d.getUTCMonth()+1):"";
  });
}

function buildTempChart(){
  if(mainChart)mainChart.destroy();
  document.getElementById("chartTitle").textContent="Gem. bodemtemperatuur sensoren vs. luchttemperatuur KNMI Eindhoven";
  var ctx=document.getElementById("mainChart").getContext("2d");
  mainChart=new Chart(ctx,{
    type:"line",
    data:{
      labels:chartLabels(),
      datasets:[
        {label:"Gem. bodemtemperatuur sensoren (°C)",data:AVG_TEMP,
         borderColor:"#4fc3f7",backgroundColor:"rgba(79,195,247,.08)",
         borderWidth:2,pointRadius:0,fill:true,tension:.3,order:1},
        {label:"Luchttemperatuur KNMI Eindhoven (°C)",data:KNMI_TEMP,
         borderColor:"#ff9f0a",backgroundColor:"transparent",
         borderWidth:2,pointRadius:0,fill:false,tension:.3,
         segment:{borderDash:function(ctx){return KNMI_TEMP[ctx.p1DataIndex]===null?[4,4]:[];}},
         order:2}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{labels:{color:"#a0c4ff",font:{size:11},boxWidth:16}},
        tooltip:{callbacks:{label:function(c){return c.dataset.label.split(" (")[0]+": "+(c.raw!==null?c.raw.toFixed(1)+"°C":"geen data");}}}
      },
      scales:{
        x:{grid:{color:"rgba(255,255,255,.05)"},ticks:{color:"#a0c4ff",font:{size:9},maxRotation:0}},
        y:{grid:{color:"rgba(255,255,255,.07)"},ticks:{color:"#ccc",font:{size:10}},
           title:{display:true,text:"°C",color:"#ccc"}}
      }
    },
    plugins:[vLinePlugin]
  });
}

function buildMoistChart(){
  if(mainChart)mainChart.destroy();
  document.getElementById("chartTitle").textContent="Gem. bodemvocht sensoren vs. neerslag KNMI Eindhoven";
  var ctx=document.getElementById("mainChart").getContext("2d");
  mainChart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:chartLabels(),
      datasets:[
        {type:"line",label:"Gem. bodemvocht sensoren (%)",data:AVG_MOIST,

var currentMode="temp",currentIdx=0,playing=false,playTimer=null;
var DAYS=["zo","ma","di","wo","do","vr","za"];
var MONS=["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];

function fmtTs(i){
  var d=new Date(GCS_HOURS[i]);
  return DAYS[d.getUTCDay()]+" "+d.getUTCDate()+" "+MONS[d.getUTCMonth()]+" "+String(d.getUTCHours()).padStart(2,"0")+":00";
}

function updateMeta(i){
  var kT=KNMI_TEMP[i],kP=KNMI_PRECIP[i],aT=AVG_TEMP[i],aM=AVG_MOIST[i];
  if(currentMode==="temp"){
    var s=(aT!==null?"Bodemtemp: "+aT.toFixed(1)+"°C":"—");
    s+=(kT!==null?"  |  Lucht: "+kT+"°C":"  |  (geen KNMI)");
    document.getElementById("chartMeta").textContent=s;
  } else {
    var s=(aM!==null?"Bodemvocht: "+aM.toFixed(1)+"%":"—");
    s+=(kP!==null?"  |  Neerslag: "+kP+" mm/uur":"  |  (geen KNMI)");
    document.getElementById("chartMeta").textContent=s;
  }
}

function updateAll(i){
  currentIdx=i;
  document.getElementById("tdisp").textContent=fmtTs(i);
  document.getElementById("slider").value=i;
  updateMarkers(i);
  if(mainChart)mainChart.update("none");
  updateMeta(i);
}

function drawLegend(grad,minLabel,maxLabel){
  document.getElementById("lMin").textContent=minLabel;
  document.getElementById("lMax").textContent=maxLabel;
  var c=document.getElementById("lGrad"),cx=c.getContext("2d");
  var gr=cx.createLinearGradient(0,0,100,0);
  grad.forEach(function(s){gr.addColorStop(s[0],"rgb("+s[1]+","+s[2]+","+s[3]+")");});
  cx.clearRect(0,0,100,8);cx.fillStyle=gr;cx.fillRect(0,0,100,8);
}

function setMode(m){
  currentMode=m;
  document.getElementById("btnT").classList.toggle("active",m==="temp");
  document.getElementById("btnM").classList.toggle("active",m==="moist");
  if(m==="temp"){
    buildTempChart();
    drawLegend(TGRAD,"10°C","45°C");
  } else {
    buildMoistChart();
    drawLegend(MGRAD,"0%","50%");
  }
  updateAll(currentIdx);
}

function togglePlay(){
  playing=!playing;
  document.getElementById("pb").innerHTML=playing?"&#9646;&#9646;":"&#9654;";
  if(playing){if(currentIdx>=GCS_HOURS.length-1)currentIdx=0;playTick();}
  else clearTimeout(playTimer);
}
function playTick(){
  if(!playing)return;
  updateAll(currentIdx);
  currentIdx++;
  if(currentIdx>=GCS_HOURS.length){playing=false;document.getElementById("pb").innerHTML="&#9654;";return;}
  playTimer=setTimeout(playTick,parseInt(document.getElementById("spd").value));
}
function step(d){
  clearTimeout(playTimer);playing=false;document.getElementById("pb").innerHTML="&#9654;";
  updateAll(Math.max(0,Math.min(GCS_HOURS.length-1,currentIdx+d)));
}
function onSlide(v){
  clearTimeout(playTimer);playing=false;document.getElementById("pb").innerHTML="&#9654;";
  updateAll(parseInt(v));
}

// Init: start bij laatste uur met KNMI data
var startIdx=0;
for(var ii=KNMI_TEMP.length-1;ii>=0;ii--){if(KNMI_TEMP[ii]!==null){startIdx=ii;break;}}
setMode("temp");
updateAll(startIdx);
</script>
